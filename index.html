<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Comisiones | Sierras Web</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* --- VARIABLES SIERRAS WEB --- */
    :root {
      --primary: #0284C7;
      --primary-dark: #0369A1;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      
      --bg-body: #F8FAFC;
      --bg-card: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #475569;
      --border: #E2E8F0;
      --hover-row: #F1F5F9;
      
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    body.dark {
      --bg-body: #0F172A;
      --bg-card: #1E293B;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --border: #334155;
      --hover-row: #334155;
      
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-body); 
      color: var(--text-main); transition: background 0.3s, color 0.3s; padding-bottom: 40px;
    }

    /* --- LOADER --- */
    #loading-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-card); z-index: 1000;
        display: flex; justify-content: center; align-items: center; flex-direction: column;
        color: var(--primary); font-weight: 600; font-size: 1.1rem;
    }

    /* --- HEADER --- */
    .app-header {
      background: var(--bg-card); padding: 15px 5%; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between;
      align-items: center; transition: background 0.3s, border-color 0.3s; margin-bottom: 30px;
    }
    
    .brand-container { display: flex; align-items: center; gap: 15px; }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; letter-spacing: -0.5px; }
    .logo span { color: var(--primary); }
    
    .brand-badge { 
      color: var(--text-main); font-weight: 500; font-size: 0.85rem; background: var(--hover-row); 
      padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 6px;
    }

    .btn-theme { 
      background: transparent; border: 1px solid var(--border); color: var(--text-muted); 
      padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; 
    }
    .btn-theme:hover { border-color: var(--primary); color: var(--primary); background: rgba(2, 132, 199, 0.05); }

    .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

    /* --- TARJETAS DE RESUMEN GLOBAL (TUS KPIs) --- */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .kpi-card { 
      background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: var(--shadow-sm); 
      border: 1px solid var(--border); display: flex; align-items: center; gap: 20px; transition: 0.3s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .kpi-icon { 
      width: 65px; height: 65px; border-radius: 12px; background: rgba(2, 132, 199, 0.1); 
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: var(--primary); 
    }
    .kpi-info h3 { margin: 0; font-size: 0.9rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-info p { margin: 5px 0 0; font-size: 1.8rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }

    .icon-success { background: rgba(16, 185, 129, 0.1) !important; color: var(--success) !important; }
    .icon-warning { background: rgba(245, 158, 11, 0.1) !important; color: var(--warning) !important; }

    /* --- CONTROLES Y FILTROS --- */
    .controls-panel { 
      background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: var(--shadow-sm); 
      border: 1px solid var(--border); margin-bottom: 25px; transition: 0.3s;
    }
    .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
    input { 
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
      background: var(--bg-body); color: var(--text-main); outline: none; transition: 0.3s; font-family: 'Inter', sans-serif;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15); }

    /* --- TARJETAS POR NEGOCIO --- */
    .business-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .business-card {
        background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-sm); 
        border: 1px solid var(--border); overflow: hidden; transition: 0.3s;
        display: flex; flex-direction: column;
    }
    .business-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    
    .bc-header { padding: 20px; border-bottom: 1px solid var(--border); background: rgba(2, 132, 199, 0.03); }
    .bc-header h2 { margin: 0; font-size: 1.2rem; color: var(--text-main); font-weight: 700; }
    
    .bc-body { padding: 20px; flex-grow: 1; }
    .bc-stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95rem; }
    .bc-stat span:first-child { color: var(--text-muted); font-weight: 500; }
    .bc-stat span:last-child { color: var(--text-main); font-weight: 700; font-family: 'Inter', monospace; }
    
    .bc-footer { padding: 15px 20px; background: rgba(16, 185, 129, 0.05); border-top: 1px solid rgba(16, 185, 129, 0.2); display: flex; justify-content: space-between; align-items: center;}
    .bc-footer span:first-child { color: var(--success); font-weight: 700; font-size: 0.95rem; text-transform: uppercase;}
    .bc-footer span:last-child { color: var(--success); font-weight: 800; font-size: 1.4rem; font-family: 'Inter', monospace;}

    #no-results { padding: 50px; text-align: center; color: var(--text-muted); grid-column: 1 / -1; }

    @media (max-width: 768px) {
        .app-header { flex-direction: column; gap: 15px; padding: 15px; }
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
      <i class="fas fa-circle-notch fa-spin fa-2x"></i>
      <p style="margin-top:15px;">Sincronizando negocios...</p>
  </div>

  <header class="app-header">
    <div class="brand-container">
      <a href="#" class="logo">Sierras<span>Web</span></a>
      <span class="brand-badge"><i class="fas fa-lock"></i> Panel Administrador</span>
    </div>
    <button id="themeToggle" class="btn-theme" title="Cambiar Tema">
      <i class="fas fa-moon" id="theme-icon"></i>
    </button>
  </header>

  <div class="dashboard-container">
    
    <div class="kpi-grid">
        <div class="kpi-card" style="border-bottom: 4px solid var(--success);">
            <div class="kpi-icon icon-success"><i class="fas fa-hand-holding-usd"></i></div>
            <div class="kpi-info">
                <h3>Comisión Total (5%)</h3>
                <p id="kpi-comision">$0.00</p>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon"><i class="fas fa-chart-line"></i></div>
            <div class="kpi-info">
                <h3>Total Facturado (Global)</h3>
                <p id="kpi-total">$0.00</p>
            </div>
        </div>
        <div class="kpi-card">
             <div class="kpi-icon icon-warning"><i class="fas fa-store"></i></div>
             <div class="kpi-info">
                 <h3>Negocios con Ventas</h3>
                 <p id="kpi-negocios">0</p>
             </div>
        </div>
    </div>

    <div class="controls-panel">
      <div class="filters-grid">
        <div>
            <label><i class="fas fa-search"></i> Buscar Negocio</label>
            <input id="search" placeholder="Ej: Panadería..." />
        </div>
        <div>
            <label><i class="far fa-calendar-alt"></i> Fecha Desde</label>
            <input id="from" type="date" />
        </div>
        <div>
            <label><i class="far fa-calendar-check"></i> Fecha Hasta</label>
            <input id="to" type="date" />
        </div>
      </div>
    </div>

    <h2 style="font-size:1.2rem; color:var(--text-main); margin: 30px 0 20px 0; font-weight:700; letter-spacing: -0.5px;">Liquidación por Negocio</h2>
    
    <div class="business-grid" id="business-container">
        </div>

  </div>

  <script>
    // --- LÓGICA DE TEMA OSCURO ---
    const themeToggle = document.getElementById('themeToggle');
    const icon = document.getElementById('theme-icon');
    
    if(localStorage.getItem('sierras_theme_admin') === 'dark') {
      document.body.classList.add('dark');
      icon.classList.replace('fa-moon', 'fa-sun');
    }

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      if(document.body.classList.contains('dark')){
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('sierras_theme_admin', 'dark');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('sierras_theme_admin', 'light');
      }
    });

    // --- 1. TU LISTA DE NEGOCIOS REALES ---
    // Agrega aquí las URLs a medida que sumes nuevos clientes a tu plataforma
    const misNegocios = [
      {
        nombre: "El Fresquito",
        url: "https://script.google.com/macros/s/AKfycbzdZ1Qsrzqopm4g4s0NZJK7AKm6plFVoKvpWdymZ-MOIAktQCWsa6Ki4te4UqJUfnfK/exec"
      }
      /* EJEMPLO DE CÓMO AGREGAR OTRO:
      ,{
        nombre: "Panadería Central",
        url: "https://script.google.com/macros/s/OTRA_URL_AQUI/exec"
      }
      */
    ];

    let rawData = [];

    // --- ELEMENTOS DOM ---
    const el = {
        container: document.getElementById('business-container'),
        inputs: {
            search: document.getElementById('search'),
            from: document.getElementById('from'),
            to: document.getElementById('to')
        },
        kpi: {
            comision: document.getElementById('kpi-comision'),
            total: document.getElementById('kpi-total'),
            negocios: document.getElementById('kpi-negocios')
        }
    };

    const formatMoney = (amount) => {
        return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(amount);
    };

    // --- 2. DESCARGAR Y SINCRONIZAR TODOS LOS NEGOCIOS ---
    async function sincronizarNegocios() {
        document.getElementById('loading-overlay').style.display = 'flex';

        const promesas = misNegocios.map(async (negocio) => {
            try {
                const res = await fetch(negocio.url);
                const json = await res.json();
                
                return (json.rows || []).map(r => {
                    const mapKey = k => k ? k.toString().toLowerCase().replace(/\s+/g,'_') : '';  
                    const norm = {};
                    for(const k in r) norm[mapKey(k)] = r[k];

                    const totalNum = parseFloat((norm.total||'0').toString().replace("$","").replace(".","").replace(",","."));
                    
                    return {
                        negocio: negocio.nombre,
                        fecha: norm.fecha_hora || norm.fecha || new Date().toISOString(),
                        total: isNaN(totalNum) ? 0 : totalNum,
                        _date: new Date(norm.fecha_hora || norm.fecha)
                    };
                });
            } catch (error) {
                console.error("Error conectando con " + negocio.nombre, error);
                return []; 
            }
        });

        const resultados = await Promise.all(promesas);
        rawData = resultados.flat();
        
        document.getElementById('loading-overlay').style.display = 'none';
        applyFilters();
    }

    // --- 3. FILTRAR Y AGRUPAR ---
    function applyFilters() {
        const search = el.inputs.search.value.toLowerCase();
        const dateFrom = el.inputs.from.value ? new Date(el.inputs.from.value) : null;
        const dateTo = el.inputs.to.value ? new Date(el.inputs.to.value) : null;
        
        if(dateTo) dateTo.setHours(23,59,59);

        const filteredData = rawData.filter(row => {
            const matchesText = row.negocio.toLowerCase().includes(search);
            let matchesDate = true;
            if(dateFrom && row._date < dateFrom) matchesDate = false;
            if(dateTo && row._date > dateTo) matchesDate = false;
            return matchesText && matchesDate;
        });

        const negociosAgrupados = {};
        let sumatoriaGlobal = 0;

        filteredData.forEach(row => {
            if (!negociosAgrupados[row.negocio]) {
                negociosAgrupados[row.negocio] = { total: 0, cantidadVentas: 0 };
            }
            negociosAgrupados[row.negocio].total += row.total;
            negociosAgrupados[row.negocio].cantidadVentas += 1;
            sumatoriaGlobal += row.total;
        });

        renderCards(negociosAgrupados, sumatoriaGlobal);
    }

    // --- 4. RENDERIZAR INTERFAZ ---
    function renderCards(negociosAgrupados, sumatoriaGlobal) {
        el.container.innerHTML = '';
        const negociosNombres = Object.keys(negociosAgrupados);
        
        // TU 5% DE COMISIÓN GLOBAL
        const comisionGlobal = sumatoriaGlobal * 0.05; 
        
        el.kpi.total.textContent = formatMoney(sumatoriaGlobal);
        el.kpi.comision.textContent = formatMoney(comisionGlobal);
        el.kpi.negocios.textContent = negociosNombres.length;

        if (negociosNombres.length === 0) {
            el.container.innerHTML = `
                <div id="no-results">
                    <i class="fas fa-store-slash fa-3x" style="margin-bottom:15px; opacity:0.3"></i>
                    <p style="font-weight:500; font-size:1.1rem; color:var(--text-main);">No hay ventas registradas</p>
                    <p style="font-size:0.9rem;">Prueba cambiando el rango de fechas.</p>
                </div>`;
            return;
        }

        negociosNombres.sort().forEach(nombre => {
            const datos = negociosAgrupados[nombre];
            // TU 5% POR NEGOCIO
            const comisionNegocio = datos.total * 0.05; 

            const card = document.createElement('div');
            card.className = 'business-card';
            card.innerHTML = `
                <div class="bc-header">
                    <h2>${nombre}</h2>
                </div>
                <div class="bc-body">
                    <div class="bc-stat">
                        <span>Ventas concretadas</span>
                        <span>${datos.cantidadVentas}</span>
                    </div>
                    <div class="bc-stat">
                        <span>Facturación Total</span>
                        <span>${formatMoney(datos.total)}</span>
                    </div>
                </div>
                <div class="bc-footer">
                    <span><i class="fas fa-check-circle"></i> A Cobrar (5%)</span>
                    <span>${formatMoney(comisionNegocio)}</span>
                </div>
            `;
            el.container.appendChild(card);
        });
    }

    // --- EVENTOS ---
    el.inputs.search.addEventListener('input', applyFilters);
    el.inputs.from.addEventListener('change', applyFilters);
    el.inputs.to.addEventListener('change', applyFilters);

    // INICIAR AL CARGAR LA PÁGINA
    sincronizarNegocios();

  </script>
</body>
</html>
